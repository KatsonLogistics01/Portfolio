<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katson Analytics Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Lora:wght@600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="page-header">
         <div class="eyebrow">
            <img src="katson logo.png" alt="" class="nav-logo">
         </div>
            <h1 class="title">Projects</h1>
                        
        <div class="filters-bar" id="filters-container">
            <span class="fl">Sector:</span>
            <button class="fb active" type="button" onclick="filter('All', this)">All</button>
        </div>

        <div class="portfolio-grid" id="portfolio-grid"></div>
    </div>

<script>
    // ── CHANGE YOUR THEME COLOR HERE ANYTIME ─────────────────────
    const THEME = '#D23450';
    const THEME1 = '#F9FAFB';

    // ── INDUSTRY CONFIG ───────────────────────────────────────────
    // All use the same THEME color. To give one industry its own
    // color, just change its bg value e.g. 'Finance': {bg:'#1A5C3A'}
    const IC = {
        'Finance':        {bg: THEME1},
        'HR':             {bg: THEME1},
        'Supply Chain':   {bg: THEME1},
        'Share Market':   {bg: THEME1},
        'Sales':          {bg: THEME1},
        'Operations':     {bg: THEME1},
        'Procurement':    {bg: THEME1},
        'Reconciliation': {bg: THEME1},
        'Healthcare':     {bg: THEME1},
        'CRM':            {bg: THEME1},
        'Digital Marketing & SEO':  {bg: THEME1}
    
    };

    // ── GOOGLE SHEET URL ──────────────────────────────────────────
    // Correct CSV export format. Sheet must be publicly shared ("Anyone with the link")
    const SHEET_ID = "1p-cyPKiiRQrXyks9rQCvJLs-MVJXFgeA";
    const sheetUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=2120182160`;

    let DATA = [];
    let AF = 'All';

    // ── LOAD DATA ─────────────────────────────────────────────────
    async function loadDataFromSheet() {
        try {
            console.log('🔄 Starting to load data from sheet...');
            console.log('Sheet URL:', sheetUrl);

            // Add timeout to prevent infinite hanging
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout

            const response = await fetch(sheetUrl, { signal: controller.signal });
            clearTimeout(timeoutId);

            if (!response.ok) throw new Error(`Sheet link failed (${response.status})`);

            const csvData = await response.text();
            console.log('📄 Raw CSV Data received:', csvData.substring(0, 200) + '...');
            
            if (!csvData || csvData.length === 0) throw new Error("Sheet returned empty data");

            const rows = csvData.split('\n').filter(row => row.trim()).slice(1);
            console.log('📊 Total rows parsed:', rows.length);

            DATA = rows.map((row, idx) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 5) {
                    console.warn(`⚠️ Row ${idx} has only ${cols.length} columns (need 5):`, row);
                    return null;
                }
                return {
                    title:        cols[0]?.replace(/"/g, '').trim(),
                    industry:     cols[1]?.replace(/"/g, '').trim(),
                    description:  cols[2]?.replace(/"/g, '').trim(),
                    dashboardUrl: cols[3]?.replace(/"/g, '').trim(),
                    imageUrl:     cols[4]?.replace(/"/g, '').trim()
                };
            }).filter(p => p !== null && p.title !== "");

            console.log('✅ Valid projects loaded:', DATA.length);
            console.log('📋 Projects data:', DATA);

            if (DATA.length === 0) throw new Error("No valid projects found in sheet");

            refresh();
        } catch (error) {
            console.error("❌ Error loading sheet:", error);
            document.getElementById('portfolio-grid').innerHTML =
                `<div style="grid-column:1/-1;text-align:center;padding:100px;color:#999;">
                    <strong>Could not load projects</strong><br>
                    ${error.message}<br>
                    <small>Make sure: 1) Sheet is publicly shared 2) CSV export is enabled 3) Sheet ID is correct</small>
                </div>`;
        }
    }

    // ── HELPERS ───────────────────────────────────────────────────
    function gc(ind) {
        for (const [k, v] of Object.entries(IC))
            if (ind && ind.toLowerCase().includes(k.toLowerCase())) return v;
        return {bg: THEME1}; // fallback always uses theme color
    }

    function buildFilters() {
        const bar = document.getElementById('filters-container');
        if (!bar) return;
        bar.innerHTML = '<span class="fl">Sector:</span><button class="fb active" type="button" onclick="filter(\'All\', this)">All</button>';

        [...new Set(DATA.map(p => p.industry))].forEach(ind => {
            if (ind) {
                const b = document.createElement('button');
                b.className = 'fb';
                b.type = 'button';
                b.textContent = ind;
                b.onclick = (e) => filter(ind, e.target);
                bar.appendChild(b);
            }
        });
    }

    function filter(v, btn) {
        AF = v;
        document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(v === 'All' ? DATA : DATA.filter(p => p.industry === v));
    }

    function render(list) {
        console.log('🎨 Rendering projects. Count:', list.length);
        console.log('Projects to render:', list);
        
        const g = document.getElementById('portfolio-grid');

        if (!list.length) {
            console.warn('⚠️ Empty list - no projects to display');
            g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:100px;">No projects found.</div>';
            return;
        }

        g.innerHTML = list.map((p) => {
            const c = gc(p.industry);
            console.log(`🖼️ Rendering card: ${p.title} (${p.industry})`);
            return `
                <div class="portfolio-card" onclick="window.open('${p.dashboardUrl}', '_blank')">
                    <div class="card-header">
                        <span class="industry-badge" style="background-color:${c.bg}">${p.industry}</span>
                        <div class="image-container">
                            <img src="${p.imageUrl}" alt="${p.title}"
                                onerror="this.src='https://via.placeholder.com/400x200?text=Preview+Coming+Soon'">
                        </div>
                    </div>
                    <div class="portfolio-info">
                        <h3>${p.title}</h3>
                       <div class="desc-container" data-fulltext="${p.description}">
                        <p class="description">${p.description}</p>
                        </div>
                        <div class="open-btn" style="background:${THEME}">View Dashboard →</div>
                    </div>
                </div>`;
        }).join('');
        
        console.log('✅ Rendering complete');
    }

    function refresh() {
        buildFilters();
        render(AF === 'All' ? DATA : DATA.filter(p => p.industry === AF));
    }

    loadDataFromSheet();
</script>
    </div>
    <footer class="main-footer">
        <p>&copy;JHS 2026. All rights reserved.</p>
    </footer>
</body>
</html>
